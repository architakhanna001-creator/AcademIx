{% extends "base.html" %}

{% block content %}

<div class="hero-section">

    <h1 class="display-4 fw-bold">
        <span style="color:var(--accent);">✦</span> AcademIx
    </h1>

    <p class="lead mt-3">
        Upload your study notes and let AcademIx create summaries, flashcards and quizzes.
    </p>

</div>

<div class="card shadow-lg border-0">

    <div class="card-body p-5">

        <form
            id="uploadForm"
            action="/upload"
            method="POST"
            enctype="multipart/form-data">

            <div class="mb-4">

                <label class="form-label fw-bold">

                    Select PDF

                </label>

                <input
                    class="form-control"
                    type="file"
                    name="pdf_file"
                    accept=".pdf"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary btn-lg">

                🚀 Generate Study Material

            </button>

        </form>

    </div>

</div>

<!-- Loading Overlay -->

<div id="loadingOverlay">

    <div class="text-center">

        <div
            class="spinner-border text-light"
            style="width:5rem;height:5rem;">

        </div>

        <h2 class="text-white mt-4">

            AcademIx is thinking...

        </h2>

        <p class="text-white">

            Creating Summary, Flashcards and Quiz

        </p>

    </div>

</div>

{% endblock %}
