<section id="flashcardSection">

<div class="card shadow-lg border-0 mt-5">

    <div class="card-header academix-header text-white d-flex justify-content-between align-items-center">

        <h3 class="mb-0">
            🧠 AI Flashcards
        </h3>

        <span id="cardCounter" class="badge academix-badge">
            Card 1 of {{ flashcards|length }}
        </span>

    </div>

    <div class="card-body">

        {% if flashcards %}

        <div class="flashcard" id="flashcard">

            <div class="flashcard-inner">

                <div class="flashcard-front">

                    <h4 class="mb-3">
                        Question
                    </h4>

                    <p id="flashcardQuestion"></p>

                    <small class="text-muted mt-3">
                        Click the card to reveal the answer
                    </small>

                </div>

                <div class="flashcard-back">

                    <h4 class="mb-3">
                        Answer
                    </h4>

                    <p id="flashcardAnswer"></p>

                    <small class="mt-3">
                        Click again to flip back
                    </small>

                </div>

            </div>

        </div>

        <div class="d-flex justify-content-between mt-4">

            <button
                id="prevCard"
                class="btn btn-outline-primary">

                ⬅ Previous

            </button>

            <button
                id="nextCard"
                class="btn btn-primary">

                Next ➡

            </button>

        </div>

        {% else %}

        <div class="alert academix-alert">

            No flashcards were generated.

        </div>

        {% endif %}

    </div>

</div>

<script>

const flashcards = {{ flashcards|tojson }};

</script>

</section>
